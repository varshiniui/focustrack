<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Focus — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <script src="chart.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Sora','Segoe UI',sans-serif;font-weight:300;
      background:linear-gradient(145deg,#0a0f1a 0%,#0f1520 60%,#111828 100%);
      color:#fff;min-height:100vh;
    }
    a{color:inherit;text-decoration:none}

    /* NAV */
    .nav{
      background:rgba(255,255,255,0.03);
      border-bottom:1px solid rgba(91,143,212,0.12);
      padding:0 40px;height:58px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .nav-logo{font-size:20px;font-weight:600;letter-spacing:-0.02em}
    .nav-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#5b8fd4;vertical-align:super;margin-left:2px;box-shadow:0 0 6px #5b8fd4}
    .nav-tabs{display:flex;gap:4px}
    .tab-btn{
      background:none;border:none;padding:8px 16px;border-radius:6px;
      color:rgba(255,255,255,0.4);font-family:'Sora',sans-serif;
      font-size:11px;letter-spacing:0.15em;text-transform:uppercase;
      cursor:pointer;transition:all 0.2s;font-weight:400;
    }
    .tab-btn.active,.tab-btn:hover{background:rgba(91,143,212,0.15);color:#5b8fd4}

    /* MAIN */
    .main{max-width:1100px;margin:0 auto;padding:36px 40px}

    /* STAT CARDS */
    .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
    .stat-card{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:10px;padding:20px 22px;
    }
    .stat-label{font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:10px}
    .stat-value{font-size:26px;font-weight:600;letter-spacing:-0.02em}
    .stat-sub{font-size:11px;color:rgba(255,255,255,0.3);margin-top:4px}

    /* PANELS */
    .panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:28px}
    .panel{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:10px;padding:22px 24px;
    }
    .panel.full{grid-column:1/-1}
    .panel-title{font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:18px}

    /* CHART */
    .chart-wrap{height:180px;position:relative}

    /* SITE TABLE */
    .site-table{width:100%;border-collapse:collapse}
    .site-table th{
      font-size:9px;letter-spacing:0.25em;text-transform:uppercase;
      color:rgba(255,255,255,0.3);padding:0 0 10px;text-align:left;font-weight:400;
    }
    .site-table td{
      padding:10px 0;border-top:1px solid rgba(255,255,255,0.05);
      font-size:13px;color:rgba(255,255,255,0.75);
    }
    .site-table tr:first-child td{border-top:none}
    .domain-cell{display:flex;align-items:center;gap:10px}
    .domain-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .badge{
      display:inline-block;font-size:8px;letter-spacing:0.1em;
      text-transform:uppercase;padding:2px 7px;border-radius:3px;font-weight:500;
    }
    .badge-prod{background:rgba(91,143,212,0.2);color:#5b8fd4}
    .badge-unprod{background:rgba(224,108,117,0.2);color:#e06c75}
    .badge-neutral{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.4)}
    .time-cell{font-family:monospace;font-size:12px;color:rgba(255,255,255,0.45)}
    .bar-mini{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:4px;overflow:hidden}
    .bar-mini-fill{height:100%;border-radius:2px}

    /* RULES SECTION */
    .rule-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
    .rule-row{
      display:flex;align-items:center;gap:10px;
      padding:10px 12px;background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.06);border-radius:7px;
    }
    .rule-domain{flex:1;font-size:13px;color:rgba(255,255,255,0.75)}
    .rule-select{
      background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
      border-radius:5px;color:#fff;padding:4px 8px;
      font-family:'Sora',sans-serif;font-size:11px;cursor:pointer;outline:none;
    }
    .toggle{
      position:relative;width:36px;height:20px;
      background:rgba(255,255,255,0.1);border-radius:10px;
      cursor:pointer;transition:background 0.2s;flex-shrink:0;border:none;
    }
    .toggle.on{background:linear-gradient(135deg,#e06c75,#be5046)}
    .toggle::after{
      content:'';position:absolute;top:2px;left:2px;
      width:16px;height:16px;border-radius:50%;background:#fff;
      transition:transform 0.2s;
    }
    .toggle.on::after{transform:translateX(16px)}
    .del-btn{
      background:none;border:1px solid rgba(255,255,255,0.1);
      border-radius:5px;color:rgba(255,255,255,0.3);
      padding:4px 8px;cursor:pointer;font-size:11px;transition:all 0.2s;
    }
    .del-btn:hover{border-color:#e06c75;color:#e06c75}

    /* ADD RULE FORM */
    .add-rule{display:flex;gap:10px;margin-top:14px}
    .add-input{
      flex:1;background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1);border-radius:7px;
      padding:10px 14px;color:#fff;font-family:'Sora',sans-serif;
      font-size:13px;outline:none;transition:border-color 0.2s;
    }
    .add-input:focus{border-color:rgba(91,143,212,0.4)}
    .add-select{
      background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
      border-radius:7px;color:#fff;padding:10px 14px;
      font-family:'Sora',sans-serif;font-size:13px;outline:none;cursor:pointer;
    }
    .add-btn{
      background:linear-gradient(135deg,#5b8fd4,#3d5a8a);
      border:none;border-radius:7px;padding:10px 20px;
      color:#fff;font-family:'Sora',sans-serif;font-size:11px;
      letter-spacing:0.15em;text-transform:uppercase;
      cursor:pointer;font-weight:500;white-space:nowrap;
    }

    /* GOALS */
    .goals-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .goal-field{display:flex;flex-direction:column;gap:6px}
    .goal-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.35)}
    .goal-input{
      background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
      border-radius:7px;padding:10px 14px;color:#fff;
      font-family:'Sora',sans-serif;font-size:16px;font-weight:500;outline:none;
    }
    .goal-unit{font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px}
    .save-goals-btn{
      margin-top:14px;
      background:linear-gradient(135deg,#5b8fd4,#3d5a8a);
      border:none;border-radius:7px;padding:11px 24px;
      color:#fff;font-family:'Sora',sans-serif;font-size:11px;
      letter-spacing:0.15em;text-transform:uppercase;
      cursor:pointer;font-weight:500;
    }

    /* TABS */
    .tab-panel{display:none}
    .tab-panel.active{display:block}

    /* TOAST */
    .toast{
      position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
      background:linear-gradient(135deg,#1a2540,#1e2d50);
      border:1px solid rgba(91,143,212,0.3);border-radius:8px;
      padding:12px 20px;font-size:13px;color:#fff;
      box-shadow:0 8px 32px rgba(0,0,0,0.4);
      animation:toastIn 0.28s ease both;z-index:999;display:none;
    }
    @keyframes toastIn{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}

    .empty-state{text-align:center;padding:32px;font-style:italic;color:rgba(255,255,255,0.25);font-family:'Lora',serif;font-size:15px}
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">Focus<span class="nav-dot"></span></div>
  <div class="nav-tabs">
    <button class="tab-btn active" data-tab="overview">Overview</button>
    <button class="tab-btn" data-tab="sites">Site Rules</button>
    <button class="tab-btn" data-tab="goals">Goals</button>
  </div>
</nav>

<div class="main">

  <!-- OVERVIEW TAB -->
  <div class="tab-panel active" id="tab-overview">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Focus Score</div>
        <div class="stat-value" id="score-val" style="color:#5b8fd4">—</div>
        <div class="stat-sub">Today</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Productive</div>
        <div class="stat-value" id="prod-val" style="color:#98c379">0m</div>
        <div class="stat-sub" id="prod-goal-sub">of — goal</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Distracted</div>
        <div class="stat-value" id="unprod-val" style="color:#e06c75">0m</div>
        <div class="stat-sub" id="unprod-goal-sub">of — limit</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Sites Visited</div>
        <div class="stat-value" id="sites-val">0</div>
        <div class="stat-sub">Today</div>
      </div>
    </div>

    <div class="panel-grid">
      <div class="panel full">
        <div class="panel-title">Weekly Overview (last 7 days)</div>
        <div class="chart-wrap"><canvas id="weekly-chart"></canvas></div>
      </div>
      <div class="panel full">
        <div class="panel-title">Today's Sites</div>
        <div id="sites-table-wrap">
          <div class="empty-state">No data yet today.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- SITE RULES TAB -->
  <div class="tab-panel" id="tab-sites">
    <div class="panel">
      <div class="panel-title">Site Rules — Classify & Block</div>
      <div class="rule-list" id="rule-list">
        <div class="empty-state">Loading…</div>
      </div>
      <div class="add-rule">
        <input class="add-input" id="new-domain" placeholder="e.g. twitter.com" />
        <select class="add-select" id="new-category">
          <option value="productive">Productive</option>
          <option value="unproductive">Unproductive</option>
          <option value="uncategorized">Neutral</option>
        </select>
        <button class="add-btn" id="add-rule-btn">Add Rule</button>
      </div>
    </div>
  </div>

  <!-- GOALS TAB -->
  <div class="tab-panel" id="tab-goals">
    <div class="panel" style="max-width:480px">
      <div class="panel-title">Daily Goals</div>
      <div class="goals-grid">
        <div class="goal-field">
          <div class="goal-label">Productive Target</div>
          <input class="goal-input" id="prod-target" type="number" min="0" value="240" />
          <div class="goal-unit">minutes per day</div>
        </div>
        <div class="goal-field">
          <div class="goal-label">Distraction Limit</div>
          <input class="goal-input" id="unprod-limit" type="number" min="0" value="60" />
          <div class="goal-unit">minutes per day</div>
        </div>
      </div>
      <button class="save-goals-btn" id="save-goals-btn">Save Goals</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="dashboard.js"></script>
</body>
</html>
